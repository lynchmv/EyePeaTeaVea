# Grafana dashboard provisioning
apiVersion: 1

providers:
  - name: 'EyePeaTeaVea'
    orgId: 1
    folder: 'EyePeaTeaVea'
    folderUid: 'eyepeateavea'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
