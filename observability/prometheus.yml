# Prometheus configuration for EyePeaTeaVea
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration (optional, can be enabled later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional, can be added later for alerting)
# rule_files:
#   - "rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # EyePeaTeaVea application metrics
  - job_name: 'eyepeateavea'
    static_configs:
      - targets: ['app:8020']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis metrics (optional - requires redis_exporter)
  # Uncomment if you add redis_exporter service
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
